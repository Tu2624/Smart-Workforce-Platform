version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: sw_mysql
    environment:
      MYSQL_DATABASE: smart_workforce
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: sw_user
      MYSQL_PASSWORD: sw_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: sw_backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=smart_workforce
      - DB_USER=sw_user
      - DB_PASSWORD=sw_password
      - JWT_SECRET=b4d385e14a487cabd0f6949fa2cb47e64fa5327dec4bab49e2bf99ab35c7eec1
      - CORS_ORIGIN=http://localhost:5173
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: sw_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3001/api
      - VITE_SOCKET_URL=http://localhost:3001

volumes:
  mysql_data:
